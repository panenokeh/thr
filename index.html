<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Aplikasi Acak THR</title>
    <!-- Tailwind CSS -->
    <script src="https://cdn.tailwindcss.com"></script>
    <!-- Lucide Icons -->
    <script src="https://unpkg.com/lucide@latest"></script>
    <!-- Google Fonts -->
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@700;800&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Plus Jakarta Sans', sans-serif; }
        .scrollbar-hide::-webkit-scrollbar { display: none; }
        .scrollbar-hide { -ms-overflow-style: none; scrollbar-width: none; }
        
        @keyframes fall {
            to { transform: translateY(100vh) rotate(360deg); }
        }
        .confetti {
            position: absolute;
            top: -10%;
            border-radius: 50%;
            animation: fall linear forwards;
        }

        input::-webkit-outer-spin-button,
        input::-webkit-inner-spin-button {
            -webkit-appearance: none;
            margin: 0;
        }
    </style>
</head>
<body class="bg-green-50 text-slate-800">

    <div id="app" class="min-h-screen flex flex-col items-center py-6 px-4 overflow-x-hidden relative">
        <!-- Area Konfeti -->
        <div id="confetti-container" class="fixed inset-0 pointer-events-none overflow-hidden z-50"></div>

        <!-- Tombol Pengaturan -->
        <button onclick="toggleSettings(true)" class="fixed top-4 right-4 p-2 bg-white rounded-full shadow-md hover:bg-gray-50 transition-colors z-40 border border-gray-100">
            <i data-lucide="settings" class="text-gray-500 w-5 h-5"></i>
        </button>

        <!-- Header -->
        <div class="text-center mb-4 px-2">
            <h1 class="text-3xl md:text-5xl font-black text-green-600 mb-1 drop-shadow-sm leading-tight">
                🎁 ACAK THR! 🎁
            </h1>
            <p class="text-sm md:text-lg text-green-700 font-medium opacity-80">
                Klik tombol di bawah untuk hadiahmu
            </p>
        </div>

        <div class="w-full max-w-4xl flex flex-col lg:flex-row gap-6 items-center lg:items-start justify-center">
            
            <!-- Kontainer Stok (Sisa Amplop) -->
            <div class="w-full lg:w-56 order-2 lg:order-1">
                <div class="bg-white/40 rounded-2xl p-3 border border-green-100">
                    <h3 class="text-xs font-black text-green-800 mb-2 px-1 flex items-center gap-1">
                        <i data-lucide="inbox" class="w-3.5 h-3.5"></i> SISA AMPLOP
                    </h3>
                    <div id="stock-list" class="flex lg:flex-col gap-2 overflow-x-auto lg:overflow-x-visible pb-2 lg:pb-0 scrollbar-hide">
                        <!-- Rendered by JS -->
                    </div>
                </div>
            </div>

            <!-- Mesin Utama -->
            <div class="w-full max-w-[340px] md:max-w-md order-1 lg:order-2">
                <div class="relative bg-white p-5 md:p-8 rounded-[2.5rem] shadow-xl border-4 md:border-8 border-yellow-400 overflow-hidden">
                    <div class="absolute top-0 left-0 w-full h-2 bg-yellow-400 opacity-30"></div>
                    
                    <!-- Slot Tampilan -->
                    <div id="display-slot" class="h-36 md:h-48 flex items-center justify-center rounded-2xl mb-6 transition-all duration-150 bg-gray-100">
                        <div id="display-content" class="text-center px-4">
                            <!-- Rendered by JS -->
                        </div>
                    </div>

                    <!-- Kontrol -->
                    <div class="space-y-3">
                        <button id="btn-action" onclick="handleAction()" class="w-full flex items-center justify-center gap-3 bg-green-500 hover:bg-green-600 text-white text-xl md:text-2xl font-bold py-4 md:py-6 rounded-2xl shadow-[0_6px_0_0_#15803d] active:shadow-none active:translate-y-1.5 transition-all">
                            <i data-lucide="play" fill="currentColor"></i>
                            MULAI!
                        </button>

                        <button onclick="resetGame()" class="w-full flex items-center justify-center gap-2 text-slate-400 hover:text-slate-500 font-bold text-sm py-1 transition-colors">
                            <i data-lucide="rotate-ccw" class="w-3.5 h-3.5"></i>
                            Ulang Kocokan
                        </button>
                    </div>
                </div>

                <!-- Pesan Menang -->
                <div id="win-message" class="hidden mt-6 animate-bounce text-center px-4">
                    <div class="bg-yellow-400 text-yellow-900 px-5 py-2.5 rounded-full font-black text-sm md:text-lg inline-flex items-center gap-2 shadow-md">
                        <i data-lucide="party-popper" class="w-4 h-4 md:w-5 md:h-5"></i>
                        <span id="win-text">DAPAT Rp 0!</span>
                    </div>
                </div>
            </div>
        </div>

        <!-- Modal Pengaturan -->
        <div id="modal-settings" class="hidden fixed inset-0 bg-black/70 backdrop-blur-md flex items-end sm:items-center justify-center p-0 sm:p-4 z-50">
            <div class="bg-white w-full max-w-xl rounded-t-[2rem] sm:rounded-3xl shadow-2xl overflow-hidden flex flex-col h-[85vh] sm:h-auto sm:max-h-[90vh]">
                <div class="p-5 border-b flex items-center justify-between bg-gray-50">
                    <div class="flex items-center gap-2">
                        <i data-lucide="settings" class="text-green-600 w-5 h-5"></i>
                        <h2 class="text-lg font-bold">Atur Stok & Pecahan</h2>
                    </div>
                    <button onclick="toggleSettings(false)" class="p-2 hover:bg-gray-200 rounded-full transition-colors">
                        <i data-lucide="x" class="w-5 h-5"></i>
                    </button>
                </div>

                <div class="p-5 overflow-y-auto space-y-6">
                    <!-- Form Tambah -->
                    <div class="bg-green-50 p-4 rounded-2xl border border-green-100">
                        <div class="grid grid-cols-2 gap-3 mb-4">
                            <div>
                                <label class="block text-[10px] font-black text-green-800 mb-1 uppercase tracking-widest">Nominal (Rp)</label>
                                <input id="new-val" type="number" placeholder="Rp..." class="w-full px-3 py-2 rounded-xl border border-green-200 focus:outline-none focus:border-green-500 font-bold text-sm">
                            </div>
                            <div>
                                <label class="block text-[10px] font-black text-green-800 mb-1 uppercase tracking-widest">Lembar</label>
                                <input id="new-count" type="number" placeholder="Stok" value="5" class="w-full px-3 py-2 rounded-xl border border-green-200 focus:outline-none focus:border-green-500 font-bold text-sm">
                            </div>
                        </div>
                        <div class="flex flex-col gap-4">
                            <div id="color-picker" class="flex gap-2 items-center justify-center">
                                <!-- Colors injected here -->
                            </div>
                            <button onclick="addNewAmount()" class="w-full bg-green-600 text-white py-3 rounded-xl font-bold hover:bg-green-700 flex items-center justify-center gap-2">
                                <i data-lucide="plus" class="w-4.5 h-4.5"></i> Tambah Baru
                            </button>
                        </div>
                    </div>

                    <!-- List Pecahan -->
                    <div class="space-y-3">
                        <h3 class="font-bold text-gray-400 text-xs flex items-center gap-2 uppercase">
                            <i data-lucide="coins" class="w-3.5 h-3.5"></i> Kelola Stok Sekarang
                        </h3>
                        <div id="manage-list" class="space-y-2">
                            <!-- Rendered by JS -->
                        </div>
                    </div>
                </div>

                <div class="p-5 bg-gray-50 border-t mt-auto">
                    <button onclick="toggleSettings(false)" class="w-full bg-slate-800 text-white py-4 rounded-2xl font-bold flex items-center justify-center gap-2 active:scale-95 transition-transform shadow-lg">
                        <i data-lucide="check" class="w-5 h-5"></i> Selesai Mengatur
                    </button>
                </div>
            </div>
        </div>

        <div class="mt-6 text-center">
            <div class="flex items-center justify-center gap-1.5 text-green-800/40 font-bold text-[10px] uppercase tracking-widest">
                <i data-lucide="wallet" class="w-3 h-3"></i>
                <span>Jangan Lupa Berbagi Kebaikan</span>
            </div>
        </div>
    </div>

    <script>
        // State Awal
        let amounts = [
            { id: 1, value: 2000, color: 'bg-gray-200', textColor: 'text-gray-700', label: 'Rp 2.000', count: 10 },
            { id: 2, value: 5000, color: 'bg-yellow-200', textColor: 'text-yellow-800', label: 'Rp 5.000', count: 10 },
            { id: 3, value: 10000, color: 'bg-purple-200', textColor: 'text-purple-800', label: 'Rp 10.000', count: 5 },
            { id: 4, value: 20000, color: 'bg-green-200', textColor: 'text-green-800', label: 'Rp 20.000', count: 5 },
            { id: 5, value: 50000, color: 'bg-blue-200', textColor: 'text-blue-800', label: 'Rp 50.000', count: 2 },
            { id: 6, value: 100000, color: 'bg-red-200', textColor: 'text-red-900', label: 'Rp 100.000', count: 1 },
        ];

        const presetColors = [
            { bg: 'bg-gray-200', text: 'text-gray-700' },
            { bg: 'bg-yellow-200', text: 'text-yellow-800' },
            { bg: 'bg-purple-200', text: 'text-purple-800' },
            { bg: 'bg-green-200', text: 'text-green-800' },
            { bg: 'bg-blue-200', text: 'text-blue-800' },
            { bg: 'bg-red-200', text: 'text-red-900' },
            { bg: 'bg-pink-200', text: 'text-pink-900' },
        ];

        let isRunning = false;
        let currentIndex = 0;
        let intervalId = null;
        let selectedColorIdx = 0;

        // Inisialisasi
        function init() {
            renderStock();
            updateDisplay();
            renderColorPicker();
            lucide.createIcons();
        }

        // Fungsi Render UI
        function renderStock() {
            const container = document.getElementById('stock-list');
            container.innerHTML = amounts.map(a => `
                <div class="flex-shrink-0 flex items-center gap-2 px-3 py-2 rounded-xl bg-white shadow-sm border ${a.count === 0 ? 'opacity-30 grayscale' : 'border-green-50'}">
                    <span class="font-bold text-xs whitespace-nowrap text-slate-700">${a.label}</span>
                    <span class="px-1.5 py-0.5 rounded-md text-[10px] font-black ${a.count > 0 ? 'bg-green-100 text-green-700' : 'bg-red-100 text-red-700'}">
                        ${a.count}
                    </span>
                </div>
            `).join('');
        }

        function updateDisplay() {
            const slot = document.getElementById('display-slot');
            const content = document.getElementById('display-content');
            const available = amounts.filter(a => a.count > 0);

            if (available.length === 0 && !isRunning) {
                slot.className = "h-36 md:h-48 flex flex-col items-center justify-center bg-gray-100 rounded-2xl mb-6 p-4 text-center";
                content.innerHTML = `
                    <i data-lucide="inbox" class="w-8 h-8 text-gray-300 mx-auto mb-1"></i>
                    <p class="text-gray-500 font-bold text-sm">Yah, stok THR habis! 😅</p>
                    <p class="text-gray-400 text-xs mt-1">Isi ulang di pengaturan.</p>
                `;
                document.getElementById('btn-action').disabled = true;
                document.getElementById('btn-action').style.opacity = "0.5";
            } else {
                const current = amounts[currentIndex];
                slot.className = `h-36 md:h-48 flex items-center justify-center rounded-2xl mb-6 transition-all duration-150 ${isRunning ? 'scale-105 border-2 border-dashed border-green-400' : 'scale-100'} ${current.color}`;
                content.innerHTML = `
                    <i data-lucide="coins" class="mx-auto mb-1 w-8 h-8 md:w-12 md:h-12 ${isRunning ? 'animate-bounce' : ''} ${current.textColor}"></i>
                    <span class="text-3xl md:text-5xl font-black tracking-tighter block truncate ${current.textColor}">
                        ${current.label}
                    </span>
                `;
                document.getElementById('btn-action').disabled = false;
                document.getElementById('btn-action').style.opacity = "1";
            }
            lucide.createIcons();
        }

        // Game Logic
        function handleAction() {
            if (!isRunning) {
                startShuffle();
            } else {
                stopShuffle();
            }
        }

        function startShuffle() {
            const available = amounts.filter(a => a.count > 0);
            if (available.length === 0) return;

            isRunning = true;
            document.getElementById('win-message').classList.add('hidden');
            document.getElementById('btn-action').innerHTML = `<i data-lucide="square" fill="currentColor"></i> BERHENTI!`;
            document.getElementById('btn-action').classList.remove('bg-green-500', 'hover:bg-green-600', 'shadow-[0_6px_0_0_#15803d]');
            document.getElementById('btn-action').classList.add('bg-red-50', 'bg-red-500', 'hover:bg-red-600', 'shadow-[0_6px_0_0_#b91c1c]', 'animate-pulse');

            intervalId = setInterval(() => {
                currentIndex = (currentIndex + 1) % amounts.length;
                // Lewati yang stoknya 0
                let attempts = 0;
                while (amounts[currentIndex].count <= 0 && attempts < amounts.length) {
                    currentIndex = (currentIndex + 1) % amounts.length;
                    attempts++;
                }
                updateDisplay();
            }, 70);
            lucide.createIcons();
        }

        function stopShuffle() {
            clearInterval(intervalId);
            isRunning = false;
            
            const result = amounts[currentIndex];
            result.count = Math.max(0, result.count - 1);

            document.getElementById('btn-action').innerHTML = `<i data-lucide="play" fill="currentColor"></i> MULAI!`;
            document.getElementById('btn-action').classList.add('bg-green-500', 'hover:bg-green-600', 'shadow-[0_6px_0_0_#15803d]');
            document.getElementById('btn-action').classList.remove('bg-red-500', 'hover:bg-red-600', 'shadow-[0_6px_0_0_#b91c1c]', 'animate-pulse');

            // Tampilkan Menang
            document.getElementById('win-text').innerText = `DAPAT ${result.label}!`;
            document.getElementById('win-message').classList.remove('hidden');

            if (result.value >= 50000) {
                spawnConfetti();
            }

            renderStock();
            updateDisplay();
            lucide.createIcons();
        }

        function resetGame() {
            if (isRunning) stopShuffle();
            document.getElementById('win-message').classList.add('hidden');
            currentIndex = 0;
            updateDisplay();
        }

        // Pengaturan
        function toggleSettings(show) {
            const modal = document.getElementById('modal-settings');
            if (show) {
                modal.classList.remove('hidden');
                renderManageList();
            } else {
                modal.classList.add('hidden');
            }
        }

        function renderColorPicker() {
            const container = document.getElementById('color-picker');
            container.innerHTML = presetColors.map((c, i) => `
                <button onclick="selectedColorIdx = ${i}; renderColorPicker();" class="w-7 h-7 rounded-full border-2 transition-transform ${c.bg} ${selectedColorIdx === i ? 'border-green-600 scale-110' : 'border-transparent'}"></button>
            `).join('');
        }

        function renderManageList() {
            const container = document.getElementById('manage-list');
            container.innerHTML = amounts.map((a) => `
                <div class="flex items-center justify-between p-3 rounded-2xl border border-gray-100 shadow-sm ${a.color}">
                    <div class="flex flex-col">
                        <span class="font-black text-sm leading-none ${a.textColor}">${a.label}</span>
                        <span class="text-[9px] font-bold opacity-50 uppercase mt-1">Sisa: ${a.count}</span>
                    </div>
                    <div class="flex items-center gap-2">
                        <div class="flex items-center bg-white/40 rounded-lg p-0.5">
                            <button onclick="changeCount(${a.id}, -1)" class="p-1.5"><i data-lucide="minus" class="w-3.5 h-3.5"></i></button>
                            <span class="w-6 text-center font-black text-xs">${a.count}</span>
                            <button onclick="changeCount(${a.id}, 1)" class="p-1.5"><i data-lucide="plus" class="w-3.5 h-3.5"></i></button>
                        </div>
                        <button onclick="removeAmount(${a.id})" class="p-2 text-red-500"><i data-lucide="trash-2" class="w-4 h-4"></i></button>
                    </div>
                </div>
            `).join('');
            lucide.createIcons();
        }

        function changeCount(id, delta) {
            const item = amounts.find(a => a.id === id);
            if (item) {
                item.count = Math.max(0, item.count + delta);
                renderManageList();
                renderStock();
                updateDisplay();
            }
        }

        function removeAmount(id) {
            amounts = amounts.filter(a => a.id !== id);
            renderManageList();
            renderStock();
            updateDisplay();
        }

        function addNewAmount() {
            const valInput = document.getElementById('new-val');
            const countInput = document.getElementById('new-count');
            const val = parseInt(valInput.value);
            const count = parseInt(countInput.value) || 0;

            if (isNaN(val) || val <= 0) return;

            const color = presetColors[selectedColorIdx];
            const newEntry = {
                id: Date.now(),
                value: val,
                label: `Rp ${val.toLocaleString('id-ID')}`,
                color: color.bg,
                textColor: color.text,
                count: count
            };

            amounts.push(newEntry);
            amounts.sort((a, b) => a.value - b.value);
            
            valInput.value = '';
            countInput.value = '5';
            renderManageList();
            renderStock();
            updateDisplay();
        }

        // Efek Konfeti
        function spawnConfetti() {
            const container = document.getElementById('confetti-container');
            for (let i = 0; i < 40; i++) {
                const conf = document.createElement('div');
                conf.className = 'confetti';
                const colors = ['#f87171', '#fbbf24', '#34d399', '#60a5fa', '#a78bfa'];
                const size = Math.random() * 8 + 4;
                
                conf.style.left = Math.random() * 100 + '%';
                conf.style.backgroundColor = colors[Math.floor(Math.random() * colors.length)];
                conf.style.width = size + 'px';
                conf.style.height = size + 'px';
                conf.style.animationDuration = (Math.random() * 2 + 2) + 's';
                conf.style.animationDelay = (Math.random() * 1) + 's';
                
                container.appendChild(conf);
                setTimeout(() => conf.remove(), 4000);
            }
        }

        // Jalankan Init saat load
        window.onload = init;
    </script>
</body>
</html>
